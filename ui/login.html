<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge — Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }
    .logo { font-size: 1.6rem; font-weight: 700; color: #ff6b35; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 32px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #ececec;
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #ff6b35; }
    button {
      width: 100%;
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #e85d2a; }
    .error {
      color: #ff4d4d;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡ Forge</div>
    <div class="subtitle">Enter your password to continue</div>
    <form id="form">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" autofocus />
      <button type="submit">Sign in</button>
      <div class="error" id="error">Incorrect password</div>
    </form>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const body = new FormData();
      body.append('password', pw);
      const res = await fetch('/api/auth/login', { method: 'POST', body });
      if (res.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('error').style.display = 'block';
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>
