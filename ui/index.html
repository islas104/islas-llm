<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="sidebar">
    <div class="logo">⚡ Forge</div>
    <button id="new-chat">+ New Chat</button>
    <div id="history"></div>
  </div>

  <div class="main">
    <div id="messages" class="messages"></div>

    <div class="input-area">
      <div class="input-bar">
        <textarea id="input" placeholder="Message Forge..." rows="1"></textarea>
        <div class="btn-group">
          <button id="stop-btn" class="hidden" title="Stop generation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
            </svg>
          </button>
          <button id="send-btn" title="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Enter to send &middot; Shift+Enter for new line</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
