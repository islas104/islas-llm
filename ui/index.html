<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Islas LLM</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#ff6b35" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Islas AI" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div id="status-bar" class="status-bar"></div>

  <!-- Sidebar -->
  <aside class="sidebar" aria-label="Conversations">
    <div class="sidebar-top">
      <div class="logo">⚡ Islas LLM</div>
      <div class="sidebar-actions">
        <button id="new-chat-btn" title="New chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
        <button id="settings-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <input type="text" id="conv-search" placeholder="Search conversations…" autocomplete="off" />
    </div>
    <div id="conv-list" class="conv-list"></div>
    <button id="feedback-btn" class="feedback-sidebar-btn">⚑ Report an issue</button>
    <button id="logout-btn" class="logout-btn">Sign out</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="mobile-header">
      <button id="sidebar-toggle" class="sidebar-toggle" title="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <span class="logo mobile-logo">⚡ Islas LLM</span>
      <button id="mobile-feedback-btn" class="mobile-feedback-btn" title="Report an issue">⚑</button>
    </div>
    <div id="messages" class="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-logo">⚡</div>
        <div class="empty-title">Islas LLM</div>
        <div class="empty-sub">How can I help you today?</div>
        <div class="suggestions">
          <button class="suggestion">Explain a concept simply</button>
          <button class="suggestion">Write or review code</button>
          <button class="suggestion">Help me debug a problem</button>
          <button class="suggestion">Help with writing or editing</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-bar">
        <textarea id="input" placeholder="Message Islas LLM…" rows="1"></textarea>
        <div class="btn-group">
          <button id="stop-btn" class="hidden" title="Stop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
            </svg>
          </button>
          <button id="send-btn" title="Send (Enter)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-meta">
        <span class="input-hint">⌘K new chat · ⌘/ search</span>
        <span id="char-count" class="char-count hidden"></span>
      </div>
    </div>
    <button id="scroll-btn" class="scroll-btn hidden" title="Scroll to bottom">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </button>
  </main>

  <div id="mobile-overlay" class="mobile-overlay"></div>

  <!-- Feedback modal -->
  <dialog id="feedback-modal" class="feedback-modal" aria-label="Report an issue">
    <div class="feedback-header">
      <span>Report an issue</span>
      <button id="close-feedback-btn">✕</button>
    </div>
    <div class="feedback-body">
      <label for="feedback-text">Describe what went wrong</label>
      <textarea id="feedback-text" rows="5" placeholder="e.g. The page went blank after sending a message…"></textarea>
    </div>
    <div class="feedback-footer">
      <button id="submit-feedback-btn" class="btn-primary">Send report</button>
    </div>
  </div>

  <!-- Settings panel -->
  <div id="settings-overlay" class="overlay hidden"></div>
  <aside id="settings-panel" class="settings-panel hidden" aria-label="Settings">
    <div class="settings-header">
      <span>Settings</span>
      <button id="close-settings-btn">✕</button>
    </div>
    <div class="settings-body">
      <div class="setting-group">
        <label for="system-prompt">System prompt</label>
        <textarea id="system-prompt" rows="5" placeholder="You are Islas LLM, a helpful AI assistant…"></textarea>
      </div>
      <div class="setting-group">
        <label for="temperature">Temperature <span id="temp-val">0.7</span></label>
        <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7" aria-valuemin="0" aria-valuemax="2" />
        <div class="range-labels"><span>Precise</span><span>Creative</span></div>
      </div>
      <div class="setting-group">
        <label for="max-tokens">Max tokens</label>
        <input type="number" id="max-tokens" min="64" max="2048" step="64" value="512" />
      </div>
    </div>
    <div class="settings-footer">
      <button id="export-btn" class="btn-secondary">↓ Export chat</button>
      <button id="save-settings-btn" class="btn-primary">Save</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
