name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /Users/ianawaz/Desktop/forge-llm
          git pull origin main

      - name: Install dependencies
        run: |
          cd /Users/ianawaz/Desktop/forge-llm
          .venv/bin/pip install -r requirements.txt --quiet

      - name: Restart server
        run: |
          launchctl unload ~/Library/LaunchAgents/com.islas.llm.plist || true
          lsof -ti :8000 | xargs kill 2>/dev/null || true
          sleep 3
          lsof -ti :8000 | xargs kill -9 2>/dev/null || true
          until ! lsof -ti :8000 > /dev/null 2>&1; do sleep 1; done
          sleep 1
          launchctl load ~/Library/LaunchAgents/com.islas.llm.plist

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            sleep 3
            curl -sf http://localhost:8000/api/health | grep '"status":"ok"' && exit 0 || true
          done
          echo "Server failed to become healthy" && exit 1
